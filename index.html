<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>mkdir home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <audio id="music" preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="terminal">

        <div id="boot-screen">

            <div id="terminal-header">
                <span id="typed-command"></span>
                <span class="cursor">▋</span>
            </div>

            <button id="startBtn">
                Construir →
            </button>

        </div>

        <div id="content" class="hidden">

            <div id="terminalText"></div>

            <div id="nextContainer" class="hidden">
                <button id="nextBtn">Continuar →</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
